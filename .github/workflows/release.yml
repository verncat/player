name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: false
          sparse-checkout: |
            .gitmodules
            .cargo
            package.json
            pnpm-lock.yaml
            index.html
            public
            src
            src-tauri
            tsconfig.json
            tsconfig.node.json
            vite.config.ts

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri desktop bundles
        env:
          CI: 'true'
        run: pnpm tauri build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: bundles-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: false
          sparse-checkout: |
            .gitmodules
            .cargo
            package.json
            pnpm-lock.yaml
            index.html
            public
            src
            src-tauri
            tsconfig.json
            tsconfig.node.json
            vite.config.ts

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android bundle
        env:
          CI: 'true'
        run: pnpm tauri android build

      - name: Prepare Android release assets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          unsigned_apk="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          if [[ ! -f "$unsigned_apk" ]]; then
            echo "Missing unsigned APK at $unsigned_apk" >&2
            exit 1
          fi

          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_ALIAS" && -n "$ANDROID_KEYSTORE_PASSWORD" ]]; then
            build_tools_dir="$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -n1)"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            "$ANDROID_SDK_ROOT/build-tools/$build_tools_dir/zipalign" -f -p 4 "$unsigned_apk" "$RUNNER_TEMP/app-aligned.apk"
            "$ANDROID_SDK_ROOT/build-tools/$build_tools_dir/apksigner" sign \
              --ks "$RUNNER_TEMP/release.keystore" \
              --ks-key-alias "$ANDROID_KEYSTORE_ALIAS" \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --key-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --out "release-assets/player-${GITHUB_REF_NAME}-android-universal.apk" \
              "$RUNNER_TEMP/app-aligned.apk"
          else
            cp "$unsigned_apk" "release-assets/player-${GITHUB_REF_NAME}-android-universal-unsigned.apk"
          fi

          if [[ -d src-tauri/gen/android/app/build/outputs/bundle ]]; then
            find src-tauri/gen/android/app/build/outputs/bundle -type f -name '*.aab' -exec cp {} release-assets/ \;
          fi

      - name: Upload Android bundles
        uses: actions/upload-artifact@v7
        with:
          name: bundles-android
          if-no-files-found: error
          path: release-assets/**/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-desktop
      - build-android

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bundles-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: player ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-artifacts/**/*
