name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build/publish, for example v0.2.2
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    name: Resolve Release Target
    runs-on: ubuntu-latest

    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}

    steps:
      - name: Resolve release tag and checkout ref
        id: resolve
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
        run: |
          set -euo pipefail
          release_tag="${INPUT_RELEASE_TAG:-}"
          checkout_ref="${GITHUB_REF_VALUE}"

          if [[ -z "$release_tag" ]]; then
            release_tag="$GITHUB_REF_NAME_VALUE"
          else
            checkout_ref="refs/tags/$release_tag"
          fi

          if [[ -z "$release_tag" ]]; then
            echo "Release tag could not be resolved" >&2
            exit 1
          fi

          {
            echo "release_tag=$release_tag"
            echo "checkout_ref=$checkout_ref"
          } >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Build Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}
          persist-credentials: false
          submodules: false
          sparse-checkout: |
            .gitmodules
            .cargo
            package.json
            pnpm-lock.yaml
            index.html
            public
            scripts
            src
            src-tauri
            tsconfig.json
            tsconfig.node.json
            vite.config.ts

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri desktop bundles
        env:
          CI: 'true'
        run: pnpm tauri build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: bundles-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/*.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    needs: prepare-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}
          persist-credentials: false
          submodules: false
          sparse-checkout: |
            .gitmodules
            .cargo
            package.json
            pnpm-lock.yaml
            index.html
            public
            scripts
            src
            src-tauri
            tsconfig.json
            tsconfig.node.json
            vite.config.ts

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android bundle
        env:
          CI: 'true'
        run: pnpm tauri android build

      - name: Prepare Android release assets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS || secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          unsigned_apk="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          if [[ ! -f "$unsigned_apk" ]]; then
            echo "Missing unsigned APK at $unsigned_apk" >&2
            exit 1
          fi

          if [[ -z "$ANDROID_KEYSTORE_BASE64" || -z "$ANDROID_KEYSTORE_ALIAS" || -z "$KEYSTORE_PASS" ]]; then
            echo "Android signing secrets are missing. Expected ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_ALIAS, and KEYSTORE_PASS." >&2
            exit 1
          fi

          build_tools_dir="$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -n1)"
          signed_apk="release-assets/player-${{ needs.prepare-release.outputs.release_tag }}-android-universal.apk"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          "$ANDROID_SDK_ROOT/build-tools/$build_tools_dir/zipalign" -f -p 4 "$unsigned_apk" "$RUNNER_TEMP/app-aligned.apk"
          "$ANDROID_SDK_ROOT/build-tools/$build_tools_dir/apksigner" sign \
            --ks "$RUNNER_TEMP/release.keystore" \
            --ks-key-alias "$ANDROID_KEYSTORE_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASS" \
            --key-pass "pass:$KEYSTORE_PASS" \
            --out "$signed_apk" \
            "$RUNNER_TEMP/app-aligned.apk"
          "$ANDROID_SDK_ROOT/build-tools/$build_tools_dir/apksigner" verify --print-certs "$signed_apk"
          rm -f "${signed_apk}.idsig"

          if [[ -d src-tauri/gen/android/app/build/outputs/bundle ]]; then
            find src-tauri/gen/android/app/build/outputs/bundle -type f -name '*.aab' -exec cp {} release-assets/ \;
          fi

      - name: Upload Android bundles
        uses: actions/upload-artifact@v7
        with:
          name: bundles-android
          if-no-files-found: error
          path: release-assets/**/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-desktop
      - build-android

    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: false
          sparse-checkout: |
            .github

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bundles-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate AI release notes
        id: release_notes
        uses: ./.github/actions/generate-release-notes
        with:
          github-token: ${{ secrets.RELEASE_TOKEN || github.token }}
          openrouter-api-key: ${{ secrets.OPEN_ROUTER_API_KEY || secrets.OPEN_ROUTER_KEY || secrets.OPEN_ROUTER }}
          github-api-url: ${{ github.api_url }}
          repository: ${{ github.repository }}
          tag-name: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: player ${{ needs.prepare-release.outputs.release_tag }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body_path: ${{ steps.release_notes.outputs.notes_path }}
          files: release-artifacts/**/*
